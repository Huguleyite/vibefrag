<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Background -->
  <rect width="52" height="52" rx="9" fill="#09090b"/>
  <!-- V ring (glass vessel walls) -->
  <path d="M9,14 L24,47 L39,14 L35,14 L24,43 L13,14 Z"
    fill="#1a1208" stroke="#c8c8d0" stroke-width="0.6" stroke-opacity="0.5"
    stroke-linejoin="round" fill-rule="evenodd"/>
  <!-- Amber solution -->
  <polygon points="24,43 17,29 31,29" fill="#d4a878"/>
  <!-- Surface line -->
  <line x1="17" y1="29" x2="31" y2="29" stroke="#c8c8d0" stroke-opacity="0.4" stroke-width="0.7"/>
  <!-- Falling drop -->
  <ellipse cx="24" cy="10" rx="3.5" ry="5" fill="#d4a878"/>
</svg>
