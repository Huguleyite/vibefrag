<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Scent — VibeFrag</title>
  <meta name="description" content="5 questions. Three picks — a splurge, a designer, and a dupe — matched to your occasion, season, and budget.">
  <link rel="canonical" href="https://vibefrag.com/quiz/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vibefrag.com/quiz/">
  <meta property="og:title" content="Find My Scent — VibeFrag">
  <meta property="og:description" content="5 questions. Three picks — a splurge, a designer, and a dupe — matched to your occasion, season, and budget.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --void: #09090b;
      --silver: #c8c8d0;
      --silver-mid: #878790;
      --silver-dim: rgba(135,135,144,0.50);
      --amber: #b08558;
      --amber-warm: #d4a878;
      --amber-ghost: rgba(176, 133, 88, 0.10);
      --glass-border: rgba(255, 255, 255, 0.11);
      /* Result tier colors — adapted for dark bg */
      --splurge:  #d4a878;
      --designer: #7b9fc7;
      --dupe:     #6aad6a;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--void);
      color: var(--silver);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ATMOSPHERE ── */
    .aperture { position: fixed; top: -80px; left: 50%; transform: translateX(-50%) translateZ(0); width: 720px; height: 380px; background: radial-gradient(ellipse 55% 70% at 50% 15%, rgba(215,210,200,0.20) 0%, rgba(190,180,165,0.10) 35%, rgba(150,140,128,0.05) 58%, transparent 80%); filter: blur(14px); pointer-events: none; z-index: 1; }
    .caustics { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; contain: layout style; }
    .caustic { position: absolute; border-radius: 50%; filter: blur(55px); mix-blend-mode: screen; will-change: transform, opacity; transform: translateZ(0); }
    .c1 { width:420px; height:260px; top:4%; left:18%; background:radial-gradient(ellipse,rgba(205,188,160,0.17) 0%,transparent 70%); animation:float1 20s ease-in-out infinite; }
    .c2 { width:320px; height:210px; top:8%; right:12%; background:radial-gradient(ellipse,rgba(185,165,135,0.13) 0%,transparent 70%); animation:float2 25s ease-in-out infinite; }
    .c3 { width:500px; height:190px; top:22%; left:30%; background:radial-gradient(ellipse,rgba(215,205,185,0.09) 0%,transparent 70%); animation:float3 30s ease-in-out infinite; }
    .c4 { width:260px; height:310px; top:12%; left:48%; background:radial-gradient(ellipse,rgba(165,135,105,0.11) 0%,transparent 70%); animation:float4 22s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1);opacity:.80} 33%{transform:translate(45px,-30px) scale(1.15);opacity:.50} 66%{transform:translate(-28px,18px) scale(.90);opacity:.95} }
    @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1);opacity:.60} 40%{transform:translate(-50px,28px) scale(1.12);opacity:.90} 72%{transform:translate(22px,-18px) scale(.85);opacity:.40} }
    @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1);opacity:.50} 50%{transform:translate(32px,42px) scale(1.20);opacity:.80} }
    @keyframes float4 { 0%,100%{transform:translate(0,0) scale(1);opacity:.70} 35%{transform:translate(-22px,-42px) scale(.80);opacity:.40} 75%{transform:translate(48px,12px) scale(1.10);opacity:.90} }

    .glass-wall { position:fixed; top:0; bottom:0; width:200px; pointer-events:none; z-index:4; transform:translateZ(0); }
    .glass-wall.left  { left:0;  background:linear-gradient(to right, rgba(7,7,9,.95) 0%, rgba(13,13,16,.68) 30%, rgba(18,16,14,.22) 65%, transparent 100%); }
    .glass-wall.right { right:0; background:linear-gradient(to left,  rgba(7,7,9,.95) 0%, rgba(13,13,16,.68) 30%, rgba(18,16,14,.22) 65%, transparent 100%); }
    .glass-wall::before { content:''; position:absolute; top:8%; bottom:8%; width:1px; background:linear-gradient(to bottom, transparent 0%, rgba(225,225,235,.14) 18%, rgba(225,225,235,.38) 50%, rgba(225,225,235,.14) 82%, transparent 100%); }
    .glass-wall.left::before  { right:0; }
    .glass-wall.right::before { left:0; }
    .vignette-btm { position:fixed; bottom:0; left:0; right:0; height:160px; background:linear-gradient(to top, var(--void) 0%, transparent 100%); pointer-events:none; z-index:4; }

    /* ── NAV ── */
    nav { position: fixed; top:0; left:0; right:0; z-index: 10; padding: 0 3rem; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.065); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 1.25rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--silver); text-decoration: none; position: relative; z-index: 11; }
    .nav-logo .frag { color: var(--amber-warm); }
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a { text-decoration: none; font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--silver-mid); transition: color 0.3s; }
    .nav-links a:hover { color: var(--silver); }
    .nav-links a.nav-active { color: var(--amber-warm); }
    .nav-links a.nav-cta { color: var(--amber-warm); border: 1px solid rgba(200,180,140,0.30); padding: 0.4rem 1rem; transition: all 0.3s; }
    .nav-links a.nav-cta:hover { background: rgba(176,133,88,0.12); border-color: rgba(200,180,140,0.55); color: var(--silver); }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 0.5rem; position: relative; z-index: 11; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--silver); transition: all 0.3s ease; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* ── QUIZ WRAP ── */
    #quiz-wrap { position: relative; z-index: 5; display: flex; justify-content: center; padding: 6rem 24px 5rem; }
    #app { width: 100%; max-width: 580px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s var(--ease) forwards; }

    /* ── PROGRESS ── */
    .progress { display: flex; gap: 6px; justify-content: center; margin-bottom: 3rem; }
    .progress-dot { height: 2px; width: 40px; border-radius: 2px; background: rgba(255,255,255,0.10); transition: background 0.35s var(--ease); }
    .progress-dot.active { background: var(--amber); }
    .progress-dot.done   { background: rgba(176,133,88,0.35); }

    /* ── INTRO ── */
    .intro { text-align: center; padding: 2rem 0 0; }
    .intro-eyebrow { font-size: 0.6rem; font-weight: 300; letter-spacing: 0.32em; text-transform: uppercase; color: var(--amber); margin-bottom: 1.8rem; }
    .intro-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 6vw, 3.2rem); font-weight: 300; letter-spacing: 0.02em; color: var(--silver); line-height: 1.15; margin-bottom: 1rem; }
    .intro-sub { font-size: 0.9rem; color: var(--silver-mid); max-width: 380px; margin: 0 auto 2.5rem; line-height: 1.75; font-weight: 200; letter-spacing: 0.03em; }

    /* ── QUESTION ── */
    .q-header { text-align: center; margin-bottom: 2rem; }
    .q-step { font-size: 0.6rem; font-weight: 300; letter-spacing: 0.28em; text-transform: uppercase; color: var(--silver-mid); margin-bottom: 0.8rem; opacity: 0.7; }
    .q-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 300; letter-spacing: 0.02em; color: var(--silver); line-height: 1.2; }

    /* ── OPTIONS ── */
    .options { display: grid; gap: 0.7rem; }
    .options.grid-2 { grid-template-columns: 1fr 1fr; }
    .options.grid-3 { grid-template-columns: 1fr 1fr 1fr; }

    .option {
      background: var(--amber-ghost);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      padding: 1.1rem 1.2rem; cursor: pointer; text-align: left;
      transition: border-color 0.2s, background 0.2s, transform 0.12s;
      user-select: none;
    }
    .option:hover { border-color: rgba(200,180,140,0.35); background: rgba(176,133,88,0.15); }
    .option.selected { border-color: var(--amber); background: rgba(176,133,88,0.20); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12); }
    .option:active { transform: scale(0.98); }
    .opt-label { font-size: 0.85rem; font-weight: 300; color: var(--silver); letter-spacing: 0.03em; }
    .opt-sub { font-size: 0.72rem; color: var(--silver-mid); margin-top: 0.3rem; line-height: 1.4; font-weight: 200; }

    /* ── BUTTONS ── */
    .btn-primary {
      display: inline-block; padding: 0.9rem 2.5rem;
      background: transparent; border: 1px solid rgba(200,180,140,0.32);
      color: var(--amber-warm); font-family: 'Inter', sans-serif;
      font-weight: 300; font-size: 0.65rem; letter-spacing: 0.26em;
      text-transform: uppercase; cursor: pointer; transition: all 0.4s;
      backdrop-filter: blur(8px); text-decoration: none;
    }
    .btn-primary:hover { background: rgba(176,133,88,0.14); border-color: rgba(200,180,140,0.60); color: var(--silver); }

    .btn-ghost {
      background: transparent; border: 1px solid rgba(255,255,255,0.10);
      color: var(--silver-mid); font-family: 'Inter', sans-serif;
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.22em;
      text-transform: uppercase; padding: 0.7rem 1.8rem;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.22); color: var(--silver); }

    /* ── RESULTS ── */
    .results-header { text-align: center; margin-bottom: 2rem; }
    .results-label { font-size: 0.6rem; font-weight: 300; letter-spacing: 0.32em; text-transform: uppercase; color: var(--amber); margin-bottom: 0.6rem; }
    .results-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 300; letter-spacing: 0.02em; color: var(--silver); margin-bottom: 0.8rem; }
    .results-accord-tag {
      display: inline-block;
      background: var(--amber-ghost);
      border: 1px solid rgba(176,133,88,0.25);
      color: var(--amber-warm);
      font-size: 0.6rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      padding: 0.4rem 1.2rem;
    }

    /* ── RESULT CARDS ── */
    .cards { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: var(--amber-ghost);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 8px 30px rgba(0,0,0,0.40);
      padding: 1.6rem; position: relative;
      transition: border-color 0.25s;
    }
    .card.highlighted { border-color: var(--amber); box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 8px 40px rgba(0,0,0,0.50); }
    .card.splurge  { --tier-color: var(--splurge); }
    .card.designer { --tier-color: var(--designer); }
    .card.dupe     { --tier-color: var(--dupe); }

    .rec-badge {
      position: absolute; top: -11px; right: 1.2rem;
      background: var(--amber); color: var(--void);
      font-size: 0.55rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 3px 14px;
    }
    .card-tier { font-size: 0.58rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tier-color); margin-bottom: 0.8rem; }
    .card-brand { font-size: 0.6rem; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; color: var(--silver-mid); margin-bottom: 0.3rem; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: 0.01em; color: var(--silver); margin-bottom: 1rem; line-height: 1.2; }
    .card-notes { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.9rem; }
    .note-pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--silver-mid);
      font-size: 0.62rem; font-weight: 200; letter-spacing: 0.06em;
      padding: 0.25rem 0.75rem;
    }
    .card-desc { font-size: 0.8rem; color: var(--silver-mid); line-height: 1.7; margin-bottom: 1.2rem; font-weight: 200; letter-spacing: 0.02em; }
    .card-shop {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--tier-color); color: var(--tier-color);
      padding: 0.5rem 1.4rem;
      font-size: 0.6rem; font-weight: 300; text-decoration: none; letter-spacing: 0.18em; text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }
    .card-shop:hover { background: var(--tier-color); color: var(--void); }

    .restart-wrap { text-align: center; margin-top: 2rem; padding-bottom: 4rem; }

    /* ── FOOTER ── */
    footer { position: relative; z-index: 5; padding: 2.5rem 3rem; border-top: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 0.9rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--silver-mid); text-decoration: none; }
    .footer-logo .frag { color: var(--amber-warm); }
    .footer-tagline { font-size: 0.58rem; letter-spacing: 0.14em; color: rgba(135,135,144,0.50); margin-top: 0.3rem; }
    .footer-links { display: flex; gap: 2rem; list-style: none; }
    .footer-links a { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--silver-mid); text-decoration: none; transition: color 0.3s; }
    .footer-links a:hover { color: var(--silver); }

    /* ── MOBILE ── */
    @media (max-width: 960px) { .glass-wall { width: 100px; } }
    @media (max-width: 640px) { .glass-wall { display: none; } }
    @media (max-width: 768px) {
      nav { padding: 0 1.5rem; }
      .nav-inner { padding: 1.2rem 0; }
      .nav-hamburger { display: flex; }
      .nav-links { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(9,9,11,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); flex-direction: column; align-items: center; justify-content: center; gap: 2.8rem; z-index: 10; }
      .nav-links.nav-open { display: flex; }
      .nav-links a { font-size: 0.85rem; letter-spacing: 0.26em; }
      .nav-links a.nav-cta { font-size: 0.85rem; padding: 0.7rem 2rem; }
      footer { padding: 2rem 1.5rem; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
      .footer-links { flex-wrap: wrap; gap: 1.2rem; }
    }
    @media (max-width: 540px) {
      #quiz-wrap { padding: 5rem 1.2rem 3rem; }
      .options.grid-2, .options.grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
  /* Pause caustics when hidden */
  document.addEventListener('visibilitychange', () => {
    const s = document.hidden ? 'paused' : 'running';
    document.querySelectorAll('.caustic').forEach(el => { el.style.animationPlayState = s; });
  });

  /* Hamburger */
  const navToggle = document.getElementById('nav-toggle');
  const navLinks  = document.getElementById('nav-links');
  if (navToggle && navLinks) {
    navToggle.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('nav-open');
      navToggle.classList.toggle('open', isOpen);
      navToggle.setAttribute('aria-expanded', isOpen);
    });
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => { navLinks.classList.remove('nav-open'); navToggle.classList.remove('open'); navToggle.setAttribute('aria-expanded','false'); });
    });
  }

  /* ── QUIZ LOGIC (unchanged) ── */

      }

      },

    woody_earthy: {

  const ACCORD_LABELS = {
    fresh_aquatic:"Fresh & Aquatic", citrus:"Citrus", floral:"Floral",
    woody_earthy:"Woody & Earthy", oriental_spicy:"Oriental & Spicy",
    gourmand:"Gourmand", chypre:"Chypre", fougere:"Fougère", green:"Green"
  };

  const ACCORD_DESCRIPTIONS = {
    fresh_aquatic:  "Clean and waterfront-fresh — announces itself without demanding the room.",
    citrus:         "Bright and effortless — the scent equivalent of stepping outside on a clear morning.",
    floral:         "A bouquet that wears like confidence — soft power you can smell from across the room.",
    woody_earthy:   "Grounded and warm. It builds presence without raising its voice.",
    oriental_spicy: "Rich, addictive, and built for the room you're about to walk into.",
    gourmand:       "Warm and inviting — the kind of scent people lean in for.",
    chypre:         "Sophisticated and layered. This one rewards a second impression.",
    fougere:        "Clean, dependable, professional. Smells like someone who has everything together.",
    green:          "Earthy and alive — like the air right after rain."
  };

  const QUESTIONS = [
    { id:'occasion', text:"What's the occasion?", grid:'grid-2', options:[
      { value:'work',     label:'Work',          sub:'Office, meetings, professional' },
      { value:'date',     label:'Date',           sub:'Romantic, intimate, impressive' },
      { value:'social',   label:'Social / Party', sub:'Dinner, events, going out' },
      { value:'outdoors', label:'Outdoors',       sub:'Active, casual, fresh air' },
      { value:'special',  label:'Special Event',  sub:'Wedding, formal, milestone' },
      { value:'everyday', label:'Everyday',       sub:'Low-key, reliable, daily wear' }
    ]},
    { id:'time', text:"What time of day?", grid:'grid-3', options:[
      { value:'day',     label:'Morning / Day', sub:'Before 5pm' },
      { value:'evening', label:'Evening',       sub:'Dinner, after work' },
      { value:'night',   label:'Night Out',     sub:'Late night, bar, club' }
    ]},
    { id:'season', text:"What season?", grid:'grid-2', options:[
      { value:'spring', label:'Spring', sub:'Fresh, blooming, mild' },
      { value:'summer', label:'Summer', sub:'Hot, bright, vacation' },
      { value:'fall',   label:'Fall',   sub:'Crisp, cozy, transitional' },
      { value:'winter', label:'Winter', sub:'Cold, warm indoors, rich' }
    ]},
    { id:'gender', text:"Who's wearing it?", grid:'', options:[
      { value:'masc',   label:'Me — masculine', sub:"Traditional men's fragrance profiles" },
      { value:'fem',    label:'Me — feminine',  sub:"Traditional women's fragrance profiles" },
      { value:'unisex', label:'Me — unisex',    sub:'Wearable by anyone, no rules' },
      { value:'gift',   label:"It's a gift",    sub:'Universal picks that work across the board' }
    ]},
    { id:'budget', text:"What's your budget?", grid:'grid-2', options:[
      { value:'25_50',   label:'$25 – $50',  sub:'The Dupe is your move' },
      { value:'50_100',  label:'$50 – $100', sub:'Designer territory' },
      { value:'100_200', label:'$100 – $200',sub:'Premium designer range' },
      { value:'200plus', label:'$200+',       sub:'The Splurge is calling' }
    ]}
  ];

  function getAccord(occasion, time, season) {
    const scores = { fresh_aquatic:0, citrus:0, floral:0, woody_earthy:0, oriental_spicy:0, gourmand:0, chypre:0, fougere:0, green:0 };
    const maps = [
      { work:{fresh_aquatic:3,fougere:3,citrus:2}, date:{floral:3,oriental_spicy:2,chypre:2},
        social:{gourmand:3,oriental_spicy:2,floral:1}, outdoors:{green:3,citrus:2,fresh_aquatic:1},
        special:{chypre:3,floral:2,oriental_spicy:1}, everyday:{citrus:3,fresh_aquatic:2,fougere:1} }[occasion],
      { day:{fresh_aquatic:2,citrus:2,green:1,fougere:1}, evening:{floral:1,oriental_spicy:2,chypre:1,gourmand:1},
        night:{oriental_spicy:3,gourmand:2,chypre:1} }[time],
      { spring:{floral:2,green:2,citrus:1,fresh_aquatic:1}, summer:{fresh_aquatic:2,citrus:2,green:1},
        fall:{woody_earthy:2,chypre:1,oriental_spicy:1,fougere:1}, winter:{oriental_spicy:2,woody_earthy:2,gourmand:2} }[season]
    ];
    maps.forEach(m => m && Object.entries(m).forEach(([k,v]) => { scores[k] += v; }));
    return Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  }

  function getRecommendedTier(b) { return {'25_50':'dupe','50_100':'designer','100_200':'designer','200plus':'splurge'}[b]||'designer'; }
  function getGenderKey(g) { return {masc:'M',fem:'F',unisex:'U',gift:'U'}[g]||'U'; }

  let state = { step:0, answers:{} };
  let transitioning = false;

  function renderIntro() {
    return `<div class="intro fade-up">
      <div class="intro-eyebrow">The Occasion Tool</div>
      <h1 class="intro-title">Find your scent<br>for every occasion.</h1>
      <p class="intro-sub">5 questions. Three picks — a splurge, a designer, and a dupe that smells just as good.</p>
      <button class="btn-primary" onclick="start()">Find My Scent →</button>
    </div>`;
  }

  function renderQuestion(step) {
    const q = QUESTIONS[step-1];
    const dots = Array.from({length:5},(_,i) => {
      const cls = i<step-1?'done':i===step-1?'active':'';
      return `<div class="progress-dot ${cls}"></div>`;
    }).join('');
    const opts = q.options.map(o => `
      <div class="option" onclick="selectAnswer('${q.id}','${o.value}',${step},this)">
        <div class="opt-label">${o.label}</div>
        ${o.sub?`<div class="opt-sub">${o.sub}</div>`:''}
      </div>`).join('');
    return `<div class="fade-up">
      <div class="progress">${dots}</div>
      <div class="q-header"><div class="q-step">Question ${step} of 5</div><div class="q-text">${q.text}</div></div>
      <div class="options ${q.grid}">${opts}</div>
    </div>`;
  }

  function renderResults() {
    const {occasion,time,season,gender,budget} = state.answers;
    const accordId = getAccord(occasion,time,season);
    const gKey = getGenderKey(gender);
    const recTier = getRecommendedTier(budget);
    const accordData = LIBRARY[accordId];
    const accordDesc = ACCORD_DESCRIPTIONS[accordId];

    const TIERS = [
      {id:'splurge',label:'The Splurge',cls:'splurge'},
      {id:'designer',label:'The Designer',cls:'designer'},
      {id:'dupe',label:'The Dupe',cls:'dupe'}
    ];

    const cards = TIERS.map(({id,label,cls}) => {
      const frag = accordData[id][gKey]||accordData[id]['U'];
      const isRec = id===recTier;
      const url = `https://www.google.com/search?tbm=shop&q=${encodeURIComponent(frag.brand+' '+frag.name+' fragrance')}`;
      const pills = frag.notes.map(n=>`<span class="note-pill">${n}</span>`).join('');
      return `<div class="card ${cls}${isRec?' highlighted':''}">
        ${isRec?'<div class="rec-badge">Best Match</div>':''}
        <div class="card-tier">${label}</div>
        <div class="card-brand">${frag.brand}</div>
        <div class="card-name">${frag.name}</div>
        <div class="card-notes">${pills}</div>
        <div class="card-desc">${accordDesc}</div>
        <a class="card-shop" href="${url}" target="_blank" rel="noopener">Shop it →</a>
      </div>`;
    }).join('');

    return `<div class="fade-up">
      <div class="results-header">
        <div class="results-label">Your Result</div>
        <div class="results-title">Your Scent</div>
        <span class="results-accord-tag">${ACCORD_LABELS[accordId]}</span>
      </div>
      <div class="cards">${cards}</div>
      <div class="restart-wrap"><button class="btn-ghost" onclick="restart()">Start over</button></div>
    </div>`;
  }

  function render() {
    const app = document.getElementById('app');
    if (state.step===0) app.innerHTML = renderIntro();
    else if (state.step<=5) app.innerHTML = renderQuestion(state.step);
    else app.innerHTML = renderResults();
  }

  function start() { state.step=1; render(); }
  function selectAnswer(qId,value,step,el) {
    if(transitioning) return; transitioning=true;
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
    el.classList.add('selected');
    state.answers[qId]=value;
    setTimeout(()=>{ state.step=step+1; render(); transitioning=false; },360);
  }
  function restart() { state={step:0,answers:{}}; transitioning=false; render(); }

  render();
</script>
